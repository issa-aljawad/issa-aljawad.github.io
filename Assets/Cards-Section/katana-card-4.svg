<svg id="katanaSvg" class="katana-svg" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg"
  aria-label="Katana sword with falling sakura petals">
  <defs>
    <linearGradient id="bladeMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8d96a4" />
      <stop offset="12%" stop-color="#f7fbff" />
      <stop offset="38%" stop-color="#c6cfdb" />
      <stop offset="65%" stop-color="#eef3f9" />
      <stop offset="100%" stop-color="#7f8898" />
    </linearGradient>

    <linearGradient id="bladeEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="handleWrap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2f2f34" />
      <stop offset="100%" stop-color="#111216" />
    </linearGradient>

    <linearGradient id="guardGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8c28f" />
      <stop offset="100%" stop-color="#8f7343" />
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- background decorative mist -->
  <circle id="mist-1" class="mist-ring" cx="350" cy="250" r="70" fill="none" stroke="rgba(255,214,214,0.22)"
    stroke-width="3" />
  <circle id="mist-2" class="mist-ring" cx="460" cy="250" r="56" fill="none" stroke="rgba(255,214,214,0.18)"
    stroke-width="2.5" />

  <!-- katana -->
  <g id="katana-group">
    <!-- blade -->
    <g id="blade">
      <path d="M210 255
                   L615 238
                   Q655 237 690 223
                   L770 192
                   Q782 188 791 197
                   Q799 206 794 217
                   L750 312
                   Q742 328 726 328
                   L210 282
                   Z" fill="url(#bladeMetal)" />

      <!-- inner line -->
      <path d="M230 267 L700 287" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round" />

      <!-- hamon style wave -->
      <path d="M260 276
                   Q290 265 320 276
                   T380 276
                   T440 276
                   T500 276
                   T560 276
                   T620 276
                   T680 276" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round" />

      <!-- shine strip -->
      <rect id="blade-highlight" x="250" y="220" width="75" height="110" rx="18" fill="url(#bladeEdge)" opacity="0.85"
        transform="rotate(-6 288 275)" filter="url(#softGlow)" />
    </g>

    <!-- guard + handle -->
    <g id="handle-group">
      <!-- tsuba -->
      <ellipse cx="192" cy="270" rx="26" ry="39" fill="url(#guardGold)" />
      <ellipse cx="192" cy="270" rx="11" ry="19" fill="#3d2d15" />

      <!-- habaki -->
      <rect x="203" y="246" width="20" height="48" rx="4" fill="#c7b183" />

      <!-- handle base -->
      <rect x="72" y="236" width="130" height="68" rx="18" fill="url(#handleWrap)" />

      <!-- end cap -->
      <rect x="60" y="246" width="18" height="48" rx="6" fill="#8d7343" />

      <!-- wrap diamonds -->
      <path d="M90 270 L105 245 L120 270 L105 295 Z" fill="#d8d0be" />
      <path d="M118 270 L133 245 L148 270 L133 295 Z" fill="#d8d0be" />
      <path d="M146 270 L161 245 L176 270 L161 295 Z" fill="#d8d0be" />
      <path d="M174 270 L189 245 L204 270 L189 295 Z" fill="#d8d0be" />

      <!-- wrap lines -->
      <path d="M82 242 L190 298" stroke="#0b0d12" stroke-width="5" stroke-linecap="round" />
      <path d="M82 298 L190 242" stroke="#0b0d12" stroke-width="5" stroke-linecap="round" />
    </g>
  </g>

  <!-- petals -->
  <g id="petals-group">
    <g id="petal-1" class="petal">
      <path d="M580 110
                   C590 95 611 95 617 112
                   C625 100 644 104 645 122
                   C646 142 621 152 606 166
                   C594 151 569 140 571 120
                   C573 104 590 99 580 110 Z" fill="#f3a2bb" stroke="#f7c9d7" stroke-width="1.5" />
    </g>

    <g id="petal-2" class="petal">
      <path d="M670 90
                   C679 78 696 80 701 95
                   C709 85 726 89 728 104
                   C730 121 710 132 698 144
                   C688 132 667 124 666 108
                   C665 94 678 89 670 90 Z" fill="#f7b0c5" stroke="#ffd7e2" stroke-width="1.5" />
    </g>

    <g id="petal-3" class="petal">
      <path d="M735 135
                   C743 124 759 126 763 140
                   C771 132 786 136 788 149
                   C790 164 772 175 761 186
                   C752 176 733 168 731 154
                   C730 142 742 137 735 135 Z" fill="#ef9fb8" stroke="#ffd8e3" stroke-width="1.5" />
    </g>
  </g>
</svg>